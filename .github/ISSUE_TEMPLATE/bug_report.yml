name: Bug report
description: Report something that looks wrong — a false pass, a false fail, a crash, or incorrect output.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. Please fill in as much as you can — a reproducer is the single most valuable thing.
  - type: input
    id: version
    attributes:
      label: mcp-compliance version
      description: Output of `mcp-compliance --version` or the version from `package.json` if you pinned it.
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: e.g. v22.9.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (specify below)
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - Streamable HTTP
        - Not sure
    validations:
      required: true
  - type: textarea
    id: target
    attributes:
      label: Target server
      description: The MCP server you tested against — package name, URL, or a minimal reproducer. If the server is private, a stub that reproduces the behavior is ideal.
      placeholder: |
        e.g. @modelcontextprotocol/server-filesystem /tmp
        or   https://my-mcp-server.example.com/mcp
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      render: shell
      placeholder: mcp-compliance test --stdio 'npx -y @modelcontextprotocol/server-filesystem /tmp'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste the offending report output (terminal, JSON, or SARIF). For JSON/SARIF, a gist link is fine.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, anything else that helps.
