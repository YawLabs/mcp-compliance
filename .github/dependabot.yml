version: 2
updates:
  # Runtime + dev dependencies. Group patch/minor bumps into a single weekly PR
  # so Dependabot noise stays low; majors still open individually so they get
  # real review.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      prod-minor:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Node type stubs track the runtime Node version we target, which is
      # driven by package.json#engines, not by Dependabot.
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major

  # Pin GitHub Action versions get bumped the same way.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        update-types:
          - minor
          - patch

  # Base image for the published Docker image.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: docker
      include: scope
