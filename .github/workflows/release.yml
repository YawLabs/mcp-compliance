name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.4.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    # Serialize releases — two concurrent dispatches would race on the
    # version bump commit and the `npm publish` call, one of which would
    # fail halfway through and leave the tag ≠ npm state inconsistent.
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        run: ./release.sh ${{ inputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true

      # Publish to the Official MCP Registry (registry.modelcontextprotocol.io)
      # so downstream registries (Glama, PulseMCP, mcpservers.org, etc.) that
      # auto-source from it pick this release up. Uses GitHub OIDC: the runner
      # is inside the YawLabs org, GitHub mints a token whose `repository_owner`
      # claim is "YawLabs", and the registry grants publish permission on the
      # `io.github.YawLabs/*` namespace from that claim alone (no pre-
      # registration with the registry needed -- the auth is purely OIDC).
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Sync server.json version to the released version
        run: |
          VERSION="${{ inputs.version }}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
