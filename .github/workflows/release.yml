name: Release

on:
  push:
    tags:
      - 'v*'

# Serialize all release runs. Tags rarely arrive back-to-back, but when they
# do, two parallel publish jobs would race on npm and one would fail with
# "cannot publish over previously published version". The group key is a
# hardcoded literal (not `${{ github.workflow }}` or `release-${{ github.ref }}`)
# so different tags share a single queue and a future rename of the workflow
# `name:` field can't silently fragment the queue across the rename window.
# cancel-in-progress is false so a queued run waits its turn instead of being
# killed: losing a tag's release event is worse than waiting a minute.
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # contents: write -> gh release create (step 5 of release.sh)
      # id-token: write -> npm provenance (step 4) AND MCP Registry OIDC (step 6)
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # The workstation pushed the bump commit + annotated tag before this run
      # fired, so release.sh in CI mode skips bump/commit/tag/push and goes
      # straight to test -> publish (with --provenance) -> GitHub release ->
      # MCP Registry (via OIDC) -> verify. Version is derived from
      # $GITHUB_REF_NAME (e.g. "v0.15.1" -> "0.15.1") inside release.sh.
      # mcp-publisher is downloaded by release.sh step 6 if not already cached.
      - name: Release
        run: bash release.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
