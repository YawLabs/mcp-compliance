name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'

jobs:
  build-and-test:
    # Cross-platform matrix: stdio transport behaves differently on Windows
    # (shell:true for npx .cmd shims) and macOS — bugs there shouldn't ship.
    runs-on: ${{ matrix.os }}
    # A hung child process in stdio-transport tests could otherwise wedge
    # for the default 360m. The full suite finishes in under 2 minutes on
    # all platforms locally; 15m is a generous ceiling.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # `npm test` is `vitest run`, which executes from source -- it does
      # NOT exercise the build. The explicit build step exists to fail-fast
      # on build config / output errors at PR time rather than discovering
      # them at release time. Worth the ~5-10s.
      - run: npm run build
      - run: npm test
      # Production-only audit catches CVEs in shipped deps (devDeps don't ship to users)
      - name: Audit production deps
        run: npm audit --omit=dev --audit-level=high
      # Generate SBOM (CycloneDX format) — uploadable to dependency tracking systems
      - name: Generate SBOM
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json --output-format JSON
        continue-on-error: true
      - name: Upload SBOM
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: ignore
