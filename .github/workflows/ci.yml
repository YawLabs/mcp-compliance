name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'

jobs:
  build-and-test:
    # Cross-platform matrix: stdio transport behaves differently on Windows
    # (shell:true for npx .cmd shims) and macOS — bugs there shouldn't ship.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      # Production-only audit catches CVEs in shipped deps (devDeps don't ship to users)
      - name: Audit production deps
        run: npm audit --omit=dev --audit-level=high
      # Generate SBOM (CycloneDX format) — uploadable to dependency tracking systems
      - name: Generate SBOM
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json --output-format JSON
        continue-on-error: true
      - name: Upload SBOM
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: ignore
