name: Docker

# Triggers:
#   1. release.published — fires on every published release regardless of
#      how it was cut (Release workflow, `gh release create`, UI). One
#      trigger covers all release paths, so the Docker image never gets
#      out of sync with npm.
#   2. workflow_dispatch — manual rebuild of any version.
#
# Earlier revisions used `workflow_run` on the Release workflow, which
# only fired when releases went through that workflow — manual
# `gh release create` cuts (like v0.13.0) left the image stale. Using
# `release.published` converges all paths.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'mcp-compliance npm version to bake in (default: latest)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          # For release events: check out the release's tag so Dockerfile
          # changes bundled with that release are used. For manual
          # dispatch: default (HEAD of default branch).
          ref: ${{ github.event.release.tag_name || github.sha }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # release event: our tags are "vX.Y.Z", npm uses "X.Y.Z".
            v="${{ github.event.release.tag_name }}"
            v="${v#v}"
            echo "version=$v" >> "$GITHUB_OUTPUT"
            echo "tag=$v" >> "$GITHUB_OUTPUT"
          fi

      # Belt-and-suspenders: npm registry propagation can lag a few seconds
      # behind the release being marked published. Poll up to 60s.
      - name: Wait for npm publish to propagate
        run: |
          v="${{ steps.ver.outputs.version }}"
          for i in $(seq 1 12); do
            if npm view "@yawlabs/mcp-compliance@$v" version >/dev/null 2>&1; then
              echo "Found @yawlabs/mcp-compliance@$v on registry"
              exit 0
            fi
            echo "Not yet; retry $i/12 in 5s..."
            sleep 5
          done
          echo "ERROR: @yawlabs/mcp-compliance@$v never appeared on npm" >&2
          exit 1

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            MCP_COMPLIANCE_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/yawlabs/mcp-compliance:latest
            ghcr.io/yawlabs/mcp-compliance:${{ steps.ver.outputs.tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
