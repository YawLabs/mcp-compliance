name: Docker

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'mcp-compliance npm version to bake in (default: latest)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            v="${GITHUB_REF#refs/tags/v}"
            echo "version=$v" >> $GITHUB_OUTPUT
            echo "tag=$v" >> $GITHUB_OUTPUT
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            MCP_COMPLIANCE_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/yawlabs/mcp-compliance:latest
            ghcr.io/yawlabs/mcp-compliance:${{ steps.ver.outputs.tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
