name: 'MCP Compliance Test'
description: 'Run the MCP compliance suite against an MCP server (HTTP URL or stdio command) in CI. Emits PR annotations and SARIF for code-scanning.'
author: 'Yaw Labs'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  target:
    description: 'MCP server URL (e.g. https://my-server.com/mcp) OR stdio command (e.g. "node ./dist/server.js" or "npx -y @modelcontextprotocol/server-filesystem /tmp"). Stdio commands run after a `--` separator handled internally.'
    required: true
  version:
    description: 'mcp-compliance npm version to use (default: latest)'
    required: false
    default: 'latest'
  format:
    description: 'Output format: terminal, json, sarif, github, markdown'
    required: false
    default: 'github'
  strict:
    description: 'Exit non-zero on any required-test failure'
    required: false
    default: 'true'
  min-grade:
    description: 'Exit non-zero if grade is below this threshold (A, B, C, D, F)'
    required: false
  output:
    description: 'Write a local SVG badge to this path (e.g. badge.svg)'
    required: false
  publish:
    description: 'Publish the report to mcp.hosting (HTTP targets only)'
    required: false
    default: 'false'
  auth:
    description: 'Authorization header value, e.g. "Bearer xxx" (HTTP only)'
    required: false
  env-file:
    description: 'Path to .env file with KEY=VALUE pairs for stdio command'
    required: false
  timeout:
    description: 'Per-request timeout in milliseconds'
    required: false
    default: '30000'
  only:
    description: 'Comma-separated categories or test IDs to run exclusively'
    required: false
  skip:
    description: 'Comma-separated categories or test IDs to skip'
    required: false
  upload-sarif:
    description: 'Also produce a sarif file at compliance.sarif (use with upload-sarif action for Code Scanning)'
    required: false
    default: 'false'

outputs:
  grade:
    description: 'Final grade (A-F)'
    value: ${{ steps.run.outputs.grade }}
  score:
    description: 'Numeric score 0-100'
    value: ${{ steps.run.outputs.score }}
  passed:
    description: 'Number of passing tests'
    value: ${{ steps.run.outputs.passed }}
  failed:
    description: 'Number of failing tests'
    value: ${{ steps.run.outputs.failed }}
  report-url:
    description: 'Public report URL on mcp.hosting (only set when publish=true and target is HTTP)'
    value: ${{ steps.run.outputs.report-url }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Run MCP compliance suite
      id: run
      shell: bash
      env:
        MCP_TARGET: ${{ inputs.target }}
        MCP_VERSION: ${{ inputs.version }}
        MCP_FORMAT: ${{ inputs.format }}
        MCP_STRICT: ${{ inputs.strict }}
        MCP_MIN_GRADE: ${{ inputs.min-grade }}
        MCP_OUTPUT: ${{ inputs.output }}
        MCP_PUBLISH: ${{ inputs.publish }}
        MCP_AUTH: ${{ inputs.auth }}
        MCP_ENV_FILE: ${{ inputs.env-file }}
        MCP_TIMEOUT: ${{ inputs.timeout }}
        MCP_ONLY: ${{ inputs.only }}
        MCP_SKIP: ${{ inputs.skip }}
        MCP_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
      run: |
        set -e

        # Build the argv. Targets are either a URL or a stdio command;
        # split on whitespace for stdio so quoted args reach the spawn.
        args=()
        if [[ "$MCP_TARGET" =~ ^https?:// ]]; then
          args+=("$MCP_TARGET")
        else
          # stdio: use -- separator so commander stops parsing flags
          args+=("--")
          # shellcheck disable=SC2206
          parts=($MCP_TARGET)
          args+=("${parts[@]}")
        fi

        # Common flags shared by every invocation. NOTE: --format is NOT
        # in here — each run chooses its own format. Previously --format
        # lived in cmd_flags and the SARIF path did a fragile bash param
        # substitution to rename it, which produced an unknown flag and
        # (depending on commander version) failed silently.
        cmd_common=()
        cmd_common+=("--timeout" "$MCP_TIMEOUT")
        [[ "$MCP_STRICT" == "true" ]] && cmd_common+=("--strict")
        [[ -n "$MCP_MIN_GRADE" ]] && cmd_common+=("--min-grade" "$MCP_MIN_GRADE")
        [[ -n "$MCP_OUTPUT" ]] && cmd_common+=("--output" "$MCP_OUTPUT")
        [[ -n "$MCP_AUTH" ]] && cmd_common+=("--auth" "$MCP_AUTH")
        [[ -n "$MCP_ENV_FILE" ]] && cmd_common+=("--env-file" "$MCP_ENV_FILE")
        [[ -n "$MCP_ONLY" ]] && cmd_common+=("--only" "$MCP_ONLY")
        [[ -n "$MCP_SKIP" ]] && cmd_common+=("--skip" "$MCP_SKIP")

        # Choose between `test` (default) and `badge` (when publishing)
        subcommand="test"
        if [[ "$MCP_PUBLISH" == "true" && "$MCP_TARGET" =~ ^https?:// ]]; then
          subcommand="badge"
        fi

        # Pin to the requested version
        pkg="@yawlabs/mcp-compliance@$MCP_VERSION"

        # Echo a redacted command line for the workflow log. GitHub's
        # automatic secret masking only covers repo/org secrets — tokens
        # piped in from `with: auth:` on a called workflow (or from a
        # plain workflow input) are NOT masked, so the token value
        # passed via `--auth` must be stripped here before echo.
        safe_cmd=("npx" "-y" "$pkg" "$subcommand" "--format" "$MCP_FORMAT")
        redact_next=0
        for arg in "${cmd_common[@]}"; do
          if [[ "$redact_next" == "1" ]]; then
            safe_cmd+=("***")
            redact_next=0
          elif [[ "$arg" == "--auth" ]]; then
            safe_cmd+=("$arg")
            redact_next=1
          else
            safe_cmd+=("$arg")
          fi
        done
        echo "Running: ${safe_cmd[*]} ${args[*]}"

        # Optional SARIF pass for Code Scanning upload. Runs with the
        # full common flag set so auth / only / skip / strict all apply.
        if [[ "$MCP_UPLOAD_SARIF" == "true" ]]; then
          npx -y "$pkg" "$subcommand" --format sarif "${cmd_common[@]}" "${args[@]}" > compliance.sarif || true
        fi

        # JSON pass to extract grade/score for workflow outputs. Must use
        # the same flags as the user-visible run so the numbers match.
        json_out=$(npx -y "$pkg" "$subcommand" --format json "${cmd_common[@]}" "${args[@]}" || true)
        echo "$json_out" > compliance.json
        grade=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('compliance.json','utf8')).grade)}catch(e){console.log('?')}")
        score=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('compliance.json','utf8')).score)}catch(e){console.log(0)}")
        passed=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('compliance.json','utf8')).summary.passed)}catch(e){console.log(0)}")
        failed=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('compliance.json','utf8')).summary.failed)}catch(e){console.log(0)}")
        report_url=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('compliance.json','utf8')).badge.reportUrl||'')}catch(e){console.log('')}")

        {
          echo "grade=$grade"
          echo "score=$score"
          echo "passed=$passed"
          echo "failed=$failed"
          echo "report-url=$report_url"
        } >> "$GITHUB_OUTPUT"

        # User-visible run in the requested format.
        npx -y "$pkg" "$subcommand" --format "$MCP_FORMAT" "${cmd_common[@]}" "${args[@]}"
